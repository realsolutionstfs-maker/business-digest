<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #FFFFFF;
      color: #1A1A1A;
      line-height: 1.6;
    }
    .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: #1A1A2E;
    }
    .header .tagline {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .accent-line {
      width: 60px;
      height: 3px;
      background-color: #E94560;
      margin: 20px auto;
    }
    .section {
      margin-bottom: 40px;
    }
    .section h2 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #1A1A2E;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #E94560;
    }
    .section p {
      font-size: 16px;
      margin-bottom: 16px;
      color: #1A1A1A;
    }
    .divider {
      height: 1px;
      background-color: #E0E0E0;
      margin: 32px 0;
    }
    .footer {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #E0E0E0;
    }
    .footer a { color: #E94560; text-decoration: none; }
    .cta-button {
      display: inline-block;
      padding: 12px 24px;
      background-color: #E94560;
      color: #FFFFFF !important;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 14px;
    }
    @media only screen and (max-width: 480px) {
      .container { padding: 20px 16px; }
      .header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Business Digest</h1>
      <div class="tagline">Three moves. Every Saturday. Zero noise.</div>
      <div class="accent-line"></div>
    </div>

    {{content}}

    <div class="footer">
      <p>You received this email because you subscribed to Business Digest.</p>
      <p><a href="{{unsubscribe_url}}">Unsubscribe</a> | <a href="{{archive_url}}">View in browser</a></p>
      <p>&copy; 2026 Business Digest. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
